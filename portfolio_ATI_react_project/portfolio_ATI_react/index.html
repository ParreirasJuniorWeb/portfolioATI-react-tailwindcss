<head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script type="module">
    import Chatbox from 'https://cdn.jsdelivr.net/npm/@chatvolt/embeds@latest/dist/chatbox/index.js';

    async function widget() {
    const widget = await Chatbox.initBubble({
      agentId: 'cmbu8fjl702eqduz6gyhrpv3l',

      //[optional] If provided will create a contact for the user and link it to the conversation
      contact: {
        ffirstName: "Israel",
        lastName: "(T.I SES)",
        email: "israel.gonçalves@saude.mg.gov.br",
        phoneNumber: "60031/60027",
      },

      //[optional] Override initial messages
      interface: {
        initialMessages: ["Olá, como você está hoje?", "Como posso ajudar?"],
      },

      //[optional] Provided context will be Appended to the Agent system prompt
      context:
        "O(A) usupario(a) é um servidor público da Secretaria de Estado de Saúde, mais conecida como SES-MG na Cidade Administrativa (cede do poder executivo do estado de Minas Gerais), na cidade de Belo Horizonte no estado de Minas Gerais e ele/ela está interessado(a) em resolver problemas da area de tecnologia da informação para que os servidores consigam executar codianamente as suas atividades sem interupções nos serviços de informática desta secretaria estatal.",
    });

    // open the chat bubble
    widget.open();

    // close the chat bubble
    widget.close()

    // or 
    widget.toggle()
  }

  widget();

  </script>
